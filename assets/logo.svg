<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 50" width="150" height="50">
  <defs>
    <!-- Gradiente sofisticado y sutil -->
    <linearGradient id="elegantGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
  </defs>

  <!-- Icono de Mouse Elegante pero más "gordito" (ancho) -->
  <g transform="translate(15, 8)">
    <!-- Forma más ancha y redondeada del mouse -->
    <path d="M 12 0 C 3 0 0 8 0 17 C 0 28 4 34 12 34 C 20 34 24 28 24 17 C 24 8 21 0 12 0 Z" fill="none" stroke="url(#elegantGrad)" stroke-width="1.2" />
    
    <!-- Línea de scroll extra fina y refinada centrada -->
    <line x1="12" y1="6" x2="12" y2="15" stroke="#00e5ff" stroke-width="1.2" stroke-linecap="round" />
  </g>

  <!-- Tipografía Elegante -->
  <text x="50" y="32" font-family="'Helvetica Neue', 'Montserrat', 'Inter', sans-serif" font-weight="200" font-size="24" fill="#ffffff" letter-spacing="10">TEC</text>
  
  <!-- Punto de acento sofisticado -->
  <circle cx="118" cy="32" r="1.5" fill="#00e5ff" opacity="0.8" />
</svg>
