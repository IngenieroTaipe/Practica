<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Page 02 - Sliders y Colores</title>
    <link rel="stylesheet" href="css/page02.css">
</head>

<body>

    <div class="window-a">
        <div class="header-icons">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><circle cx="12" cy="20" r="2"/></svg>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m18 16 4-4-4-4M6 8l-4 4 4 4"/></svg>
        </div>

        <div class="control-group">
            <label>Media volume</label>
            <div class="slider-wrapper">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11 5L6 9H2v6h4l5 4V5z"/></svg>
                <input type="range" min="0" max="100" value="30">
            </div>
        </div>

        <div class="control-group">
            <label>Alarm volume</label>
            <div class="slider-wrapper">
                <input type="range" min="0" max="100" value="10">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2M5 3 2 6M22 6l-3-3"/></svg>
            </div>
        </div>

        <div class="control-group">
            <label>Icon click callback</label>
            <div class="slider-wrapper">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                <input type="range" min="0" max="100" value="20">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
            </div>
        </div>
    </div>

    <div class="card-b">
        <div id="color-preview"></div>
        <div class="controls-b">
            <div class="rgb-row">
                <span>R</span>
                <input type="range" id="r-range" min="0" max="255" value="80">
                <input type="number" id="r-num" min="0" max="255" value="80">
            </div>
            <div class="rgb-row">
                <span>G</span>
                <input type="range" id="g-range" min="0" max="255" value="165">
                <input type="number" id="g-num" min="0" max="255" value="165">
            </div>
            <div class="rgb-row">
                <span>B</span>
                <input type="range" id="b-range" min="0" max="255" value="92">
                <input type="number" id="b-num" min="0" max="255" value="92">
            </div>
        </div>
    </div>

    <script>
        const channels = ['r', 'g', 'b'];
        const preview = document.getElementById('color-preview');

        function updateColor() {
            const r = document.getElementById('r-range').value;
            const g = document.getElementById('g-range').value;
            const b = document.getElementById('b-range').value;
            preview.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        }

        channels.forEach(channel => {
            const range = document.getElementById(`${channel}-range`);
            const num = document.getElementById(`${channel}-num`);

            // Sincronizar slider -> número
            range.addEventListener('input', () => {
                num.value = range.value;
                updateColor();
            });

            // Sincronizar número -> slider
            num.addEventListener('input', () => {
                if (num.value > 255) num.value = 255;
                if (num.value < 0) num.value = 0;

                range.value = num.value;
                updateColor();
            });
        });
    </script>
</body>

</html>
